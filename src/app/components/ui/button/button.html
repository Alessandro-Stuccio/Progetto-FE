<button
  [type]="type"
  [class]="classes"
  [disabled]="disabled || loading"
  [attr.aria-label]="ariaLabel || null"
  [attr.aria-busy]="loading || null"
  (click)="onClick($event)">

  <span *ngIf="loading" class="btn__spinner" aria-hidden="true"></span>

  <span *ngIf="iconLeft && !loading" class="btn__icon btn__icon--left" aria-hidden="true"
    [innerHTML]="iconLeft"></span>

  <span class="btn__label">
    <ng-content></ng-content>
  </span>

  <span *ngIf="iconRight && !loading" class="btn__icon btn__icon--right" aria-hidden="true"
    [innerHTML]="iconRight"></span>
</button>
